name: Check Bollinger Bands

on:
  schedule:
    # Run every 5 minutes for faster alerts
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  check-bands:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore previous alert state (dedup across runs)
      - name: Download alert state
        uses: actions/cache@v4
        with:
          path: alert_state.json
          key: alert-state-${{ github.run_id }}
          restore-keys: |
            alert-state-

      - name: Run Bollinger Band check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
        timeout-minutes: 3

      - name: Commit trade journal
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add trade_journal.csv || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update trade journal [skip ci]" && git push)
        continue-on-error: true
