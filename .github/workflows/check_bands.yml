name: Check Bollinger Bands

on:
  schedule:
    # Backup: GitHub's own cron (unreliable on free tier)
    - cron: '*/5 * * * *'
  repository_dispatch:
    types: [cron_trigger]  # Triggered by cron-job.org every 5 min
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  check-bands:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bollinger Band check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
        timeout-minutes: 3

      - name: Commit state and journal
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull --rebase || true
          git add trade_journal.csv alert_state.json last_update_id.txt 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update state [skip ci]" && git push)
        continue-on-error: true
