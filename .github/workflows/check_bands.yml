name: Check Bollinger Bands

on:
  schedule:
    # BACKUP: GitHub cron at 15-min intervals (fallback if cron-job.org is down)
    - cron: '*/15 * * * *'
  repository_dispatch:
    types: [cron_trigger]  # PRIMARY: Triggered by cron-job.org
  workflow_dispatch:  # Allow manual trigger for testing

# PREVENT DEDUP RACE CONDITIONS:
# Ensure only one instance of the bot runs at any given time.
concurrency:
  group: system-alerts
  cancel-in-progress: false

jobs:
  check-bands:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull latest state
        run: git pull origin main --rebase || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bollinger Band check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
        timeout-minutes: 3

      - name: Persist state to repo
        if: always()
        run: |
          git config user.name "Lucid Bot"
          git config user.email "bot@lucid-alerts.local"
          
          # Add each file individually (some may not exist yet)
          for f in alert_state.json last_update_id.txt trade_journal.csv signal_results.csv; do
            if [ -f "$f" ]; then
              git add -f "$f"
              echo "Added: $f"
            else
              echo "Skipped (not found): $f"
            fi
          done
          
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "bot: persist state [skip ci]"
            git pull --rebase origin main || true
            git push
            echo "State committed and pushed successfully"
          fi
