name: Check Bollinger Bands

on:
  schedule:
    # BACKUP: GitHub cron at 15-min intervals (fallback if cron-job.org is down)
    - cron: '*/15 * * * *'
  repository_dispatch:
    types: [cron_trigger]  # PRIMARY: Triggered by cron-job.org
  workflow_dispatch:  # Allow manual trigger for testing

# PREVENT DEDUP RACE CONDITIONS:
# Ensure only one instance of the bot runs at any given time.
concurrency:
  group: system-alerts
  cancel-in-progress: false

jobs:
  check-bands:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bollinger Band check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
        timeout-minutes: 3

      - name: Persist state to repo
        if: always()
        run: |
          git config user.name "Lucid Bot"
          git config user.email "bot@lucid-alerts.local"
          git add -f alert_state.json last_update_id.txt trade_journal.csv signal_results.csv 2>/dev/null || true
          git diff --cached --quiet && echo "No state changes to commit" || {
            git commit -m "bot: persist state [skip ci]"
            git push
          }
