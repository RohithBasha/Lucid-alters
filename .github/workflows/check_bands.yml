name: Check Bollinger Bands

on:
  schedule:
    # BACKUP: GitHub cron at 15-min intervals (fallback if cron-job.org is down)
    - cron: '*/15 * * * *'
  repository_dispatch:
    types: [cron_trigger]  # PRIMARY: Triggered by cron-job.org
  workflow_dispatch:  # Allow manual trigger for testing

# PREVENT DEDUP RACE CONDITIONS:
# Ensure only one instance of the bot runs at any given time.
concurrency:
  group: system-alerts
  cancel-in-progress: false

jobs:
  check-bands:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore state files
        uses: actions/cache/restore@v4
        with:
          path: |
            alert_state.json
            last_update_id.txt
            trade_journal.csv
            signal_results.csv
          key: bot-state-v1
          restore-keys: |
            bot-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bollinger Band check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
        timeout-minutes: 3

      - name: Delete stale cache
        if: always()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh cache delete bot-state-v1 || true

      - name: Save state files
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            alert_state.json
            last_update_id.txt
            trade_journal.csv
            signal_results.csv
          key: bot-state-v1
